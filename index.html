<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFOCARD Workspace</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        /* --- REVOLUTIONARY DARK THEME (WHITE, RED, YELLOW) --- */
        :root {
            --bg-main: #0f0505;
            --panel-bg: transparent;
            --card-bg: rgba(48, 12, 12, 0.75);
            
            --text-main: #f8fafc;        
            --text-muted: #facc15;       
            --success: #facc15;          
            
            --border-default: #7f1d1d;   
            --border-focus: #facc15;     
            --accent-red: #ef4444;       
            
            --font-display: 'Syne', sans-serif;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --radius-main: 16px;
            --radius-sm: 10px;
            
            --anim-bounce: cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            overflow-x: hidden;
            
            background-image: 
                linear-gradient(rgba(15, 5, 5, 0.82), rgba(15, 5, 5, 0.82)), 
                url('https://images.unsplash.com/photo-1619965375772-32480b549b7e?q=80&w=1470&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-main);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-default);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-red);
        }

        .container {
            width: 100%;
            max-width: 1140px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 10px;
        }

        header h1 {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 3rem;
            text-transform: uppercase;
            margin-bottom: 6px;
            color: var(--text-main);
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 2rem;
            }
        }

        header p {
            color: var(--accent-red);
            font-size: 0.95rem;
            font-weight: 700;
            font-family: var(--font-display);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
        }

        @media (max-width: 1024px) {
            .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 480px) {
            .dashboard-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }

        .card {
            background: var(--card-bg);
            background-color: transparent;
            border-radius: var(--radius-main);
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(8px);
            transition: transform 0.3s var(--anim-bounce), border-color 0.3s var(--anim-bounce), box-shadow 0.3s var(--anim-bounce), background-color 0.3s var(--anim-bounce);
        }

        .icon-wrapper {
            font-size: 2.2rem;
            margin-bottom: 12px;
            color: var(--text-main);
            transition: transform 0.3s var(--anim-bounce), color 0.3s var(--anim-bounce);
        }

        .card h3 {
            font-family: var(--font-display);
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-muted);
            transition: color 0.3s var(--anim-bounce);
        }

        .card:hover {
            transform: translateY(-4px);
            background: rgba(239, 68, 68, 0.2);
            border-color: var(--text-muted);
            box-shadow: 0 4px 20px rgba(250, 204, 21, 0.15);
        }
        .card:hover h3 { color: var(--text-muted); }
        .card:hover .icon-wrapper { transform: scale(1.1); color: #ffffff; }

        .sync-grid {
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 24px;
        }

        @media (max-width: 950px) { .sync-grid { grid-template-columns: 1fr; } }

        .sync-section {
            background: var(--panel-bg);
            border-radius: var(--radius-main);
            padding: 25px;
            display: flex;
            flex-direction: column;
            height: 520px;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }

        .sync-section h3 {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.25rem;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-default);
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
        }

        .message-display {
            flex-grow: 1;
            overflow-y: auto;
            border-radius: var(--radius-sm);
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            background: var(--card-bg);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            max-width: 90%;
            align-self: flex-start;
            gap: 20px;
            transition: border-color 0.2s, background-color 0.2s;
        }
        
        .msg-container:hover {
            border-color: var(--text-muted);
            background-color: rgba(239, 68, 68, 0.15);
        }

        .msg-bubble {
            word-break: break-word;
            white-space: pre-wrap; /* Preserves multiline line breaks when displaying messages */
            font-size: 0.95rem;
            line-height: 1.5;
            color: #f1f5f9;
        }

        .msg-bubble a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .msg-bubble a:hover { color: #ffffff; text-decoration: underline; }

        .msg-time {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 4px;
            display: block;
            opacity: 0.8;
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 2px;
            transition: color 0.2s, transform 0.1s;
        }

        .copy-btn:hover { color: #ffffff; transform: scale(1.05); }
        .copy-btn.copied { color: #ffffff; }

        /* --- UPDATED MULTI-LINE INPUT AREA CSS --- */
        .input-area { 
            display: flex; 
            gap: 10px; 
            align-items: flex-end; 
        }

        .input-area textarea {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-sm);
            padding: 14px;
            color: var(--text-main);
            outline: none;
            font-size: 0.95rem;
            font-family: var(--font-sans);
            transition: border-color 0.2s;
            resize: none;
            min-height: 48px;
            max-height: 140px;
            line-height: 1.4;
        }

        .input-area textarea:focus { border-color: var(--border-focus); }

        .btn {
            background: var(--accent-red);
            color: #ffffff;
            border: none;
            height: 48px;
            padding: 0 22px;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-family: var(--font-display);
            font-size: 0.95rem;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn:hover { background-color: var(--text-muted); color: #000000; }
        .btn:active { transform: scale(0.98); }

        .search-box-container { position: relative; margin-bottom: 14px; }
        .search-box-container i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.9rem; }

        .search-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-sm);
            padding: 11px 12px 11px 40px;
            color: var(--text-main);
            outline: none;
            font-size: 0.9rem;
            font-family: var(--font-sans);
            transition: border-color 0.2s;
        }

        .search-input:focus { border-color: var(--border-focus); }

        .upload-area {
            border: 2px dashed var(--border-default);
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--radius-sm);
            padding: 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 16px;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .upload-area:hover { border-color: var(--border-focus); background: rgba(239, 68, 68, 0.1); }
        .upload-area p { font-family: var(--font-display); font-weight: 700; font-size: 0.88rem; color: var(--text-main); margin-top: 4px; }
        .upload-area input { display: none; }

        .file-list { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }

        .file-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-default);
            transition: border-color 0.2s;
        }

        .file-item:hover { border-color: var(--border-focus); }

        .file-info { display: flex; align-items: center; gap: 10px; max-width: 78%; }
        .file-info i { color: var(--text-muted); font-size: 1rem; }
        
        .file-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.9rem; font-weight: 500; color: #cbd5e1; }

        .download-btn {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 1.1rem;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s var(--anim-bounce);
        }
        
        .download-btn:hover { transform: scale(1.1); color: #ffffff; }
        .no-results { text-align: center; color: var(--text-muted); font-family: var(--font-display); font-size: 0.88rem; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>INFOCARD</h1>
            <p>Brave Hero Acts Fearless</p>
        </header>

        <main class="dashboard-grid">
            <div class="card" data-platform="leetcode" data-url="https://leetcode.com">
                <div class="icon-wrapper"><i class="fa-code-branch fas"></i></div>
                <h3>LeetCode</h3>
            </div>
            <div class="card" data-platform="reddit" data-url="https://www.reddit.com">
                <div class="icon-wrapper"><i class="fab fa-reddit"></i></div>
                <h3>Reddit</h3>
            </div>
            <div class="card" data-platform="youtube" data-url="https://www.youtube.com">
                <div class="icon-wrapper"><i class="fab fa-youtube"></i></div>
                <h3>YouTube</h3>
            </div>
            <div class="card" data-platform="linkedin" data-url="https://www.linkedin.com">
                <div class="icon-wrapper"><i class="fab fa-linkedin"></i></div>
                <h3>LinkedIn</h3>
            </div>
            <div class="card" data-platform="personal-mail" data-url="https://mail.google.com">
                <div class="icon-wrapper"><i class="fas fa-envelope"></i></div>
                <h3>Personal Mail</h3>
            </div>
            <div class="card" data-platform="pro-mail" data-url="https://mail.google.com/mail/u/1/#inbox">
                <div class="icon-wrapper"><i class="fas fa-briefcase"></i></div>
                <h3>Professional Mail</h3>
            </div>
            <div class="card" data-platform="chatgpt" data-url="https://chatgpt.com">
                <div class="icon-wrapper"><i class="fas fa-brain"></i></div>
                <h3>ChatGPT</h3>
            </div>
            <div class="card" data-platform="screener" data-url="https://www.screener.in">
                <div class="icon-wrapper"><i class="fas fa-chart-line"></i></div>
                <h3>Screener</h3>
            </div>
            <div class="card" data-platform="groww" data-url="https://groww.in">
                <div class="icon-wrapper"><i class="fas fa-seedling"></i></div>
                <h3>Groww</h3>
            </div>
            <div class="card" data-platform="zerodha" data-url="https://zerodha.com">
                <div class="icon-wrapper"><i class="fas fa-wallet"></i></div>
                <h3>Zerodha</h3>
            </div>
        </main>

        <section class="sync-space">
            <div class="sync-grid">
                
                <div class="sync-section">
                    <h3><i class="far fa-comment-dots" style="color: var(--text-muted);"></i> Messages</h3>
                    <div class="message-display" id="messageDisplay"></div>
                    <div class="input-area">
                        <textarea id="msgInput" placeholder="Type a message or paste links here..."></textarea>
                        <button class="btn" id="sendBtn">Send</button>
                    </div>
                </div>

                <div class="sync-section">
                    <h3><i class="far fa-folder-open" style="color: var(--text-muted);"></i> Document Drop</h3>
                    
                    <div class="search-box-container">
                        <i class="fas fa-search"></i>
                        <input type="text" id="docSearch" class="search-input" placeholder="Search saved documents...">
                    </div>

                    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                        <i class="fas fa-cloud-upload-alt" style="font-size: 1.8rem; color: var(--text-muted);"></i>
                        <p>Click to Upload Document</p>
                        <input type="file" id="fileInput">
                    </div>

                    <div class="file-list" id="fileList"></div>
                </div>
                
            </div>
        </section>
    </div>

    <script>
        // Verified Firebase configuration parameters with API database link repaired
        const firebaseConfig = {
            apiKey: "AIzaSyDG0PY80kQioLNTiGJhaAVJNHvuqxguGOU",
            databaseURL: "https://infocard-f287a-default-rtdb.firebaseio.com/",
            projectId: "infocard-f287a"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Navigation Routing
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', () => {
                const url = card.getAttribute('data-url');
                if (url) window.open(url, '_blank');
            });
        });

        function linkify(text) {
            const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
            return text.replace(urlPattern, '<a href="$1" target="_blank">$1</a>');
        }

        function copyMessageText(btn, textToCopy) {
            navigator.clipboard.writeText(textToCopy).then(() => {
                btn.classList.add('copied');
                btn.innerHTML = '<i class="fas fa-check"></i>';
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = '<i class="far fa-copy"></i>';
                }, 2000);
            }).catch(err => console.error(err));
        }

        // 2. Realtime Firebase Chat Integration
        const msgDisplay = document.getElementById('messageDisplay');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');

        sendBtn.addEventListener('click', () => {
            if (!msgInput.value.trim()) return;
            const newMsg = {
                text: msgInput.value,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            };
            db.ref('messages').push(newMsg);
            msgInput.value = '';
            msgInput.style.height = 'auto'; // Reset height back to standard single line look after submission
        });

        // HANDLE KEYS: Enter to send, Shift+Enter for New Line. Dynamic layout resize.
        msgInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        msgInput.addEventListener('keydown', (e) => { 
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault(); 
                sendBtn.click();
            }
        });

        // Listen for message updates from any device live
        db.ref('messages').on('value', (snapshot) => {
            msgDisplay.innerHTML = '';
            snapshot.forEach((childSnapshot) => {
                const msg = childSnapshot.val();
                const container = document.createElement('div');
                container.className = 'msg-container';
                const safeText = msg.text.replace(/'/g, "\\'").replace(/\n/g, "\\n");

                container.innerHTML = `
                    <div class="msg-bubble">
                        ${linkify(msg.text)} 
                        <span class="msg-time">${msg.time}</span>
                    </div>
                    <button class="copy-btn" title="Copy" onclick="copyMessageText(this, '${safeText}')">
                        <i class="far fa-copy"></i>
                    </button>
                `;
                msgDisplay.appendChild(container);
            });
            msgDisplay.scrollTop = msgDisplay.scrollHeight;
        });

        // 3. Realtime Firebase File Drop Integration
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const docSearch = document.getElementById('docSearch');
        let localFilesArray = [];

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const fileData = {
                    name: file.name,
                    data: event.target.result
                };
                db.ref('files').push(fileData).catch(() => {
                    alert("File payload exceeds free data parameters.");
                });
            };
            reader.readAsDataURL(file);
        });

        function renderFilesList(filterText = '') {
            fileList.innerHTML = '';
            const filtered = localFilesArray.filter(file => file.name.toLowerCase().includes(filterText.toLowerCase()));
            
            if (filtered.length === 0) {
                fileList.innerHTML = `<div class="no-results">No documents found</div>`;
                return;
            }

            // Newest uploaded files will cleanly reverse to sit at the top row slot
            [...filtered].reverse().forEach((file) => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `
                    <div class="file-info">
                        <i class="far fa-file-alt"></i>
                        <span class="file-name" title="${file.name}">${file.name}</span>
                    </div>
                    <a href="${file.data}" download="${file.name}" class="download-btn" title="Download">
                        <i class="fas fa-download"></i>
                    </a>
                `;
                fileList.appendChild(item);
            });
        }

        docSearch.addEventListener('input', (e) => renderFilesList(e.target.value));

        // Listen for document additions across hardware networks
        db.ref('files').on('value', (snapshot) => {
            localFilesArray = [];
            snapshot.forEach((childSnapshot) => {
                localFilesArray.push(childSnapshot.val());
            });
            renderFilesList(docSearch.value);
        });
    </script>
</body>
</html>
